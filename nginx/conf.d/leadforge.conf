# ============================================================
#  LeadForge — Nginx Virtual Host Configuration
#
#  Subdomain strategy (per Master_Integration_Roadmap.md §4):
#    preview.yourdomain.com        → Next.js :3000 (admin dashboard + preview pages)
#    api.yourdomain.com            → FastAPI :8000  (backend API)
#
#  For local development: replace server_name with _ and remove SSL blocks.
#  For production: uncomment SSL blocks and replace yourdomain.com everywhere.
# ============================================================


# ── Local development server (HTTP only) ─────────────────────────────────────
# Comment this block out when adding SSL for production.
server {
    listen 80;
    server_name _;

    # Certbot ACME challenge (needed only during initial SSL cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Frontend — Next.js (admin dashboard + preview pages)
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend API — FastAPI (proxied under /api for same-origin requests)
    location /api/ {
        proxy_pass       http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


